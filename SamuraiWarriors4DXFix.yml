name: Samurai Warriors 4 DX Fix

# Enables or disables this mod.
masterEnable: true

# Enter desired resolution.
# A value of 0 in either width or height will use your desktop's resolution.
resolution:
  width: 0
  height: 0

# Available fixes
fixes:

  # Unstretches, constrains, and centers the HUD and movies to 16:9.
  hud:
    enable: true
